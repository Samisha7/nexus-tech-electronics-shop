<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusTech | Login & Register</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            cursor: pointer;
            color: #94a3b8;
            font-weight: 600;
        }
        .tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
        }
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="/"><img src="/logo.png" alt="NexusTech Logo">NEXUSTECH</a>
        </div>
        <nav class="nav-links">
            <a href="/">Shop</a>
            <a href="/cart.html" id="cart-link">Cart <span id="cart-count">0</span></a>
            <a href="/profile.html" id="profile-link" style="display: none;">Profile</a>
            <a href="/login.html" id="auth-link" style="color: var(--primary-color);">Login</a>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <div class="tabs">
                <div class="tab active" id="login-tab" onclick="switchTab('login')">Login</div>
                <div class="tab" id="register-tab" onclick="switchTab('register')">Register</div>
            </div>

            <div id="login-form" class="form-section active">
                <form onsubmit="handleAuth(event, 'login')">
                    <div class="alert" id="login-alert"></div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                </form>
            </div>

            <div id="register-form" class="form-section">
                <form onsubmit="handleAuth(event, 'register')">
                    <div class="alert" id="register-alert"></div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="username" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 NexusTech Electronics. All rights reserved.</p>
    </footer>

    <script src="/js/ui.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateCartCount();
            checkAuthStatus();
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            
            document.getElementById(`${tab}-tab`).classList.add('active');
            document.getElementById(`${tab}-form`).classList.add('active');
            
            document.querySelectorAll('.alert').forEach(a => a.style.display = 'none');
        }
    </script>
</body>
</html>
