<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusTech | My Profile</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="/"><img src="/logo.png" alt="NexusTech Logo">NEXUSTECH</a>
        </div>
        <div class="search-bar">
            <form onsubmit="handleSearch(event)">
                <input type="text" id="search-input" placeholder="Search products...">
                <button type="submit" class="btn btn-primary search-btn">Search</button>
            </form>
        </div>
        <nav class="nav-links">
            <a href="/">Shop</a>
            <a href="/cart.html" id="cart-link">Cart <span id="cart-count">0</span></a>
            <a href="/profile.html" id="profile-link" style="color: var(--primary-color); display: none;">Profile</a>
            <a href="/login.html" id="auth-link">Login</a>
        </nav>
    </header>

    <main class="profile-container">
        <div class="profile-header">
            <h1 id="user-greeting">My Profile</h1>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>

        <section class="order-history-section">
            <h2>Order History</h2>
            <div id="order-history-list">
                <p>Loading orders...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 NexusTech Electronics. All rights reserved.</p>
    </footer>

    <script src="/js/ui.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/products.js"></script>
    <script src="/js/orders.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuthStatus();
            const user = getCurrentUser();
            if (!user) {
                window.location.href = '/login.html';
                return;
            }
            document.getElementById('user-greeting').textContent = `Hello, ${user.username}!`;
            updateCartCount();
            loadOrderHistory();
        });
    </script>
</body>
</html>
