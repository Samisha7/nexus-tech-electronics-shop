<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusTech | Shopping Cart</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="/"><img src="/logo.png" alt="NexusTech Logo">NEXUSTECH</a>
        </div>
        <div class="search-bar">
            <form onsubmit="handleSearch(event)">
                <input type="text" id="search-input" placeholder="Search products...">
                <button type="submit" class="btn btn-primary search-btn">Search</button>
            </form>
        </div>
        <nav class="nav-links">
            <a href="/">Shop</a>
            <a href="/cart.html" id="cart-link" style="color: var(--primary-color);">Cart <span id="cart-count">0</span></a>
            <a href="/profile.html" id="profile-link" style="display: none;">Profile</a>
            <a href="/login.html" id="auth-link">Login</a>
        </nav>
    </header>

    <main>
        <section class="cart-container">
            <h1 style="margin-bottom: 2rem;">Your Cart</h1>
            <div id="cart-items">
                <!-- Cart items will load here -->
            </div>
            <div class="cart-summary">
                <h2>Total: $<span id="cart-total">0.00</span></h2>
                <button class="btn btn-primary" style="margin-top: 1rem; width: 100%;" onclick="checkout()">Proceed to Checkout</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 NexusTech Electronics. All rights reserved.</p>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
            updateCartCount();
            checkAuthStatus();
        });
    </script>
</body>
</html>
